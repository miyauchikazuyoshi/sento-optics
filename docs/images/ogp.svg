<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="hsla(210,45%,55%,0.15)"/>
      <stop offset="100%" stop-color="hsla(210,45%,55%,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="70%" r="35%">
      <stop offset="0%" stop-color="hsla(240,40%,50%,0.12)"/>
      <stop offset="100%" stop-color="hsla(240,40%,50%,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Scattered particles (depth simulation) -->
  <!-- Far (small, dim) -->
  <circle cx="150" cy="120" r="1.5" fill="hsla(210,40%,60%,0.25)"/>
  <circle cx="320" cy="80" r="1" fill="hsla(220,40%,55%,0.2)"/>
  <circle cx="890" cy="150" r="1.5" fill="hsla(230,40%,55%,0.2)"/>
  <circle cx="1050" cy="100" r="1" fill="hsla(240,35%,50%,0.18)"/>
  <circle cx="500" cy="550" r="1.5" fill="hsla(215,40%,55%,0.22)"/>
  <circle cx="700" cy="580" r="1" fill="hsla(225,35%,50%,0.18)"/>
  <circle cx="200" cy="480" r="1" fill="hsla(235,40%,55%,0.2)"/>
  <circle cx="1000" cy="500" r="1.5" fill="hsla(210,40%,60%,0.22)"/>

  <!-- Mid (medium) -->
  <circle cx="280" cy="200" r="2.5" fill="hsla(215,45%,60%,0.35)"/>
  <circle cx="950" cy="250" r="3" fill="hsla(235,40%,55%,0.3)"/>
  <circle cx="100" cy="400" r="2" fill="hsla(220,45%,58%,0.3)"/>
  <circle cx="1100" cy="380" r="2.5" fill="hsla(245,40%,55%,0.28)"/>
  <circle cx="600" cy="100" r="2" fill="hsla(225,40%,58%,0.3)"/>

  <!-- Near (large, bright with glow) -->
  <circle cx="180" cy="160" r="12" fill="hsla(210,45%,55%,0.06)"/>
  <circle cx="180" cy="160" r="4" fill="hsla(210,45%,65%,0.5)"/>
  <circle cx="180" cy="160" r="1.5" fill="hsla(210,20%,90%,0.6)"/>

  <circle cx="1020" cy="200" r="15" fill="hsla(240,40%,50%,0.05)"/>
  <circle cx="1020" cy="200" r="5" fill="hsla(240,40%,60%,0.45)"/>
  <circle cx="1020" cy="200" r="2" fill="hsla(240,20%,88%,0.5)"/>

  <circle cx="80" cy="520" r="10" fill="hsla(220,45%,55%,0.05)"/>
  <circle cx="80" cy="520" r="3.5" fill="hsla(220,45%,62%,0.4)"/>

  <circle cx="1120" cy="480" r="12" fill="hsla(250,40%,52%,0.05)"/>
  <circle cx="1120" cy="480" r="4" fill="hsla(250,40%,60%,0.4)"/>

  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94a3b8" letter-spacing="0.05em">sento-optics</text>

  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#e2e8f0">"What is a liquid, really?"</text>

  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8">Electronic delocalization as a unifying descriptor</text>
  <text x="600" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8">for interface properties</text>

  <!-- Causal chains -->
  <text x="600" y="480" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" fill="hsla(200,80%,65%,0.7)">
    <tspan>Luster: &#x3B4; &#x00D7; D</tspan><tspan font-size="12" dy="3">eff</tspan><tspan dy="-3"> &#x2192; &#x3B5;(&#x3C9;) &#x2192; R(&#x3C9;)</tspan>
  </text>
  <text x="600" y="510" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" fill="hsla(220,80%,65%,0.7)">Surface tension: &#x3B4; &#x2192; n_ws &#x2192; &#x3B3;</text>
  <text x="600" y="540" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" fill="hsla(240,80%,65%,0.7)">Phase: (&#x3B4;_nuc, &#x3B4;_elec) &#x2192; solid / liquid / gas</text>

  <!-- Water line at bottom -->
  <line x1="0" y1="600" x2="1200" y2="600" stroke="hsla(200,60%,50%,0.2)" stroke-width="1"/>
  <rect x="0" y="600" width="1200" height="30" fill="hsla(200,50%,20%,0.3)"/>
</svg>
